<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>MistakeAI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI";
  background: linear-gradient(135deg,#dbeafe,#eff6ff,#f0f9ff);
  display:flex;justify-content:center;align-items:center;height:100vh;
}

.card{
  width:520px;padding:25px;border-radius:25px;
  background:white;box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

.logo{font-size:26px;font-weight:bold;color:#2563eb;text-align:center;}

textarea{
  width:100%;height:110px;margin-top:12px;
  border-radius:14px;padding:12px;border:1px solid #e5e7eb;
}

button{
  width:100%;margin-top:10px;padding:13px;
  border-radius:14px;border:none;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  color:white;cursor:pointer;
}

img{width:100%;margin-top:10px;border-radius:12px;}

.box{padding:12px;border-radius:12px;margin-top:10px;}
.red{background:#fee2e2;color:#991b1b;}
.yellow{background:#fef3c7;color:#92400e;}
.green{background:#dcfce7;color:#065f46;}
</style>
</head>

<body>

<div class="card">
<div class="logo">🤖 MistakeAI</div>

<input type="file" id="image">
<img id="preview">

<button onclick="readImage()">📸 Đọc ảnh</button>

<textarea id="input" placeholder="Ví dụ: (x^2 - 9)/(x-3) = x - 3"></textarea>

<button onclick="analyze()">🔍 Phân tích</button>

<div id="result"></div>
</div>

<script>

// preview
image.onchange = e=>{
  preview.src = URL.createObjectURL(e.target.files[0]);
};

// OCR
function readImage(){
  let file=image.files[0];
  if(!file) return alert("Chọn ảnh trước");

  result.innerHTML="⏳ Đang đọc ảnh...";
  Tesseract.recognize(file,'eng').then(r=>{
    input.value=r.data.text;
    result.innerHTML="✅ Đã đọc";
  });
}

// chuẩn hóa
function norm(s){
  return s.toLowerCase()
    .replace(/\)\(/g,")*(")
    .replace(/(\d)(x)/g,"$1*$2")
    .replace(/x(\d)/g,"x*$1")
    .replaceAll(" ","");
}

// so sánh
function isEqual(l,r){
  try{
    return math.simplify(`(${l})-(${r})`).toString()==="0";
  }catch{return false;}
}

// đáp án đúng
function correct(expr){
  try{return math.simplify(expr).toString();}
  catch{return null;}
}

// 🧠 GIẢI THÍCH THÔNG MINH
function explain(expr){

  // bình phương
  if(expr.includes("^2")){
    return `
👉 Nhận dạng: Bình phương<br>
👉 Công thức: (a±b)^2 = a^2 ± 2ab + b^2<br>
👉 Khai triển đúng rồi so sánh kết quả
`;
  }

  // hiệu 2 bình phương
  if(expr.includes("x^2-")){
    return `
👉 Nhận dạng: Hiệu hai bình phương<br>
👉 a^2 - b^2 = (a-b)(a+b)<br>
👉 Sau đó rút gọn nếu có
`;
  }

  // phân thức
  if(expr.includes("/")){
    return `
👉 Nhận dạng: Phân thức<br>
👉 Bước 1: Phân tích tử thành nhân tử<br>
👉 Bước 2: Rút gọn với mẫu<br>
👉 Bước 3: Thu được kết quả đơn giản
`;
  }

  // nhân ngoặc
  if(expr.includes(")(")){
    return `
👉 Nhận dạng: Nhân đa thức<br>
👉 Áp dụng: (a+b)(c+d)=ac+ad+bc+bd<br>
👉 Sau đó rút gọn
`;
  }

  return `
👉 Áp dụng các quy tắc biến đổi đại số cơ bản<br>
👉 Rút gọn biểu thức để kiểm tra
`;
}

// UI
function show(e,r,a){
  result.innerHTML=`
  ${e?`<div class="box red">❌ ${e}</div>`:""}
  ${r?`<div class="box yellow">⚠️ ${r}</div>`:""}
  ${a?`<div class="box green">✅ ${a}</div>`:""}
  `;
}

// MAIN
function analyze(){

  let raw=input.value;

  if(!raw.includes("=")){
    show("Thiếu '='","","");
    return;
  }

  let [L,R]=raw.split("=");

  let left=norm(L), right=norm(R);

  if(isEqual(left,right)){
    show("","Hai vế tương đương (ĐÚNG)","");
    return;
  }

  let ans=correct(left);
  let exp=explain(raw);

  show(
    "Biểu thức sai",
    exp,
    "Đáp án đúng: "+ans
  );
}

</script>

</body>
</html>
